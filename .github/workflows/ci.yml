name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  contracts:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.lock') }}

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --workspace

      - name: Build WASM artifacts
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release --workspace

  backend:
    name: NestJS Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       carbonledger_test
          POSTGRES_USER:     carbonledger
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Validate Prisma schema
        working-directory: backend
        env:
          DATABASE_URL: postgresql://carbonledger:testpassword@localhost:5432/carbonledger_test
        run: npx prisma validate

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://carbonledger:testpassword@localhost:5432/carbonledger_test
          JWT_SECRET: test-secret
        run: npm test

  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
        run: npm run build

  oracle:
    name: Python Oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: oracle
        run: pip install -r requirements.txt

      - name: Syntax check
        working-directory: oracle
        run: |
          python3 -m py_compile verification_listener.py
          python3 -m py_compile price_oracle.py
          python3 -m py_compile satellite_monitor.py
