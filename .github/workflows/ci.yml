name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lint-dockerfiles:
    name: Lint Dockerfiles – no floating tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any FROM uses a floating tag (no digest)
        run: |
          # Match FROM lines that have a tag but no @sha256: digest
          if grep -rE '^FROM [^#]+:[^@]+$' frontend/Dockerfile backend/Dockerfile oracle/Dockerfile; then
            echo "ERROR: Floating base image tags detected. All FROM statements must pin a digest (@sha256:...)."
            exit 1
          fi
          echo "All FROM statements are digest-pinned."

  contracts:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            carbonledger/contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('carbonledger/contracts/**/Cargo.lock') }}

      - name: Run contract tests
        working-directory: carbonledger/contracts
        run: cargo test --workspace

      - name: Build WASM artifacts
        working-directory: carbonledger/contracts
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Report WASM sizes
        if: github.event_name == 'pull_request'
        working-directory: carbonledger/contracts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          REPORT="## 📦 WASM Size Report\n\n| Contract | Size |\n|---|---|\n"
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            name=$(basename "$wasm" .wasm)
            size=$(du -sh "$wasm" | cut -f1)
            bytes=$(wc -c < "$wasm")
            REPORT="${REPORT}| \`${name}\` | ${size} (${bytes} bytes) |\n"
          done
          REPORT="${REPORT}\n> Built from commit \`${{ github.sha }}\`"
          gh api repos/${REPO}/issues/${PR_NUMBER}/comments \
            --method POST \
            --field body="$(printf '%b' "$REPORT")"

  backend:
    name: NestJS Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       carbonledger_test
          POSTGRES_USER:     carbonledger
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: carbonledger/backend/package-lock.json

      - name: Install dependencies
        working-directory: carbonledger/backend
        run: npm ci

      - name: Validate Prisma schema
        working-directory: carbonledger/backend
        env:
          DATABASE_URL: postgresql://carbonledger:testpassword@localhost:5432/carbonledger_test
        run: npx prisma validate

      - name: Run backend tests
        working-directory: carbonledger/backend
        env:
          DATABASE_URL: postgresql://carbonledger:testpassword@localhost:5432/carbonledger_test
          JWT_SECRET: test-secret
        run: npm test

  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: carbonledger/frontend/package-lock.json

      - name: Install dependencies
        working-directory: carbonledger/frontend
        run: npm ci

      - name: Type check
        working-directory: carbonledger/frontend
        run: npx tsc --noEmit || true

      - name: Run frontend tests
        working-directory: carbonledger/frontend
        run: npm test

      - name: Build
        working-directory: carbonledger/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
        run: npm run build

  oracle:
    name: Python Oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: carbonledger/oracle
        run: pip install -r requirements.txt

      - name: Syntax check
        working-directory: carbonledger/oracle
        run: |
          python3 -m py_compile verification_listener.py
          python3 -m py_compile price_oracle.py
          python3 -m py_compile satellite_monitor.py
