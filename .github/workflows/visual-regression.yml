name: Visual Regression Tests

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/visual-regression.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run visual regression tests
        working-directory: frontend
        run: npm run test:visual
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload baseline images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: frontend/tests/e2e/__screenshots__/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'frontend/test-results/results.json';
            
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const stats = results.stats;
              
              const comment = `## Visual Regression Test Results
              
              - ✅ Passed: ${stats.expected}
              - ❌ Failed: ${stats.unexpected}
              - ⏭️ Skipped: ${stats.skipped}
              
              [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Fail if visual regressions detected
        if: failure()
        run: |
          echo "Visual regression tests failed. Review the report above."
          exit 1
